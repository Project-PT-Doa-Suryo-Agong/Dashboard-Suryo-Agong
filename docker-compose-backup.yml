services:
  # ========================================
  # PRODUCTION ENVIRONMENT
  # ========================================
  nextjs_app-dashboard-doa:
    build:
      context: .
      args:
        - ENV_FILE=.env
    container_name: nextjs_app-dashboard-doa
    restart: always
    env_file:
      - .env
    networks:
      - bolo-carubra-network

  nginx-dashboard-doa:
    image: nginx:alpine
    container_name: nginx_proxy_doa
    restart: always
    ports:
      - "8083:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - nextjs_app-dashboard-doa
    networks:
      - bolo-carubra-network

  tunnel-dashboard-doa:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared_tunnel-doa
    restart: always
    command: tunnel run
    env_file:
      - .env
    depends_on:
      - nginx-dashboard-doa
    networks:
      - bolo-carubra-network

  # ========================================
  # DEVELOPMENT ENVIRONMENT
  # ========================================
  dev-nextjs_app-dashboard-doa:
    build:
      context: .
      args:
        - ENV_FILE=.env.dev
    container_name: dev-nextjs_app-dashboard-doa
    restart: always
    env_file:
      - .env.dev
    networks:
      - bolo-carubra-network

  dev-nginx-dashboard-doa:
    image: nginx:alpine
    container_name: dev-nginx_proxy_doa
    restart: always
    ports:
      - "8084:80"
    volumes:
      - ./nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - dev-nextjs_app-dashboard-doa
    networks:
      - bolo-carubra-network

  networks:
  bolo-carubra-network:
    name: carubra-ai-launch_bolo-carubra-network
    external: true
